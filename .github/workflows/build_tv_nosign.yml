name: Build TV APK (No Sign Required)

on:
  workflow_dispatch:  # 手动触发

jobs:
  build-tv:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: 设置 Java 17 环境
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
          cache: gradle

      - name: 设置 Flutter 环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: simple_live_tv_app/pubspec.yaml
          cache: true

      - name: 获取依赖包
        working-directory: simple_live_tv_app
        run: flutter pub get

      - name: 构建 TV APK
        working-directory: simple_live_tv_app
        run: flutter build apk --release --split-per-abi

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: simple_live_tv_apk
          path: |
            simple_live_tv_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            simple_live_tv_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 30
